<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Processing payment…</title>
    <style>
      html,body{margin:0;height:100%;background:#fff;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
      .wrap{display:flex;align-items:center;justify-content:center;height:100%}
      .box{text-align:center;color:#444}
      .spinner{width:40px;height:40px;border:3px solid #e5e5e5;border-top-color:#111;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
      p{font-size:14px;margin:0}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div class="wrap"><div class="box"><div class="spinner"></div><p>Processing…</p></div></div>
    <!--
      Tranzila return bridge.
      Tranzila may redirect here with parameters in the query string (GET) OR
      post a form to this URL (POST). Plain HTML can't read POST bodies, but
      modern Tranzila configurations use GET redirects with query params, and
      forms posted via target=_top will still hit this page — in that case the
      query string is empty and we additionally read any auto-submitted form
      fields the browser may have placed on the page (rare).

      In all cases we forward whatever we can find back to the parent window
      via postMessage, tagged with __tranzilaBridge so the React component
      knows to act on it.
    -->
    <script>
      (function () {
        var params = {};

        // 1) Query string (GET redirect — the common case).
        try {
          new URLSearchParams(window.location.search).forEach(function (v, k) {
            params[k] = v;
          });
        } catch (e) { /* ignore */ }

        // 2) Hash fragment (some configurations use #key=value&...).
        try {
          if (window.location.hash && window.location.hash.length > 1) {
            new URLSearchParams(window.location.hash.slice(1)).forEach(function (v, k) {
              if (params[k] == null) params[k] = v;
            });
          }
        } catch (e) { /* ignore */ }

        // 3) Any auto-rendered form on the page (POST fallback variant where
        // Tranzila renders the response inside a form — uncommon but safe).
        try {
          var forms = document.getElementsByTagName("form");
          for (var i = 0; i < forms.length; i++) {
            var inputs = forms[i].elements;
            for (var j = 0; j < inputs.length; j++) {
              var el = inputs[j];
              if (el && el.name && params[el.name] == null) {
                params[el.name] = el.value;
              }
            }
          }
        } catch (e) { /* ignore */ }

        params.__tranzilaBridge = true;

        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(params, "*");
          }
          // Some configurations open success in _top instead of the iframe.
          if (window.opener) {
            window.opener.postMessage(params, "*");
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </body>
</html>
